name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  node-checks:
    name: Node checks and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: TypeScript and sample validation
        run: npm run check

      - name: Parser tests
        run: npm run test

  cpp-export-and-parse:
    name: C++ example export and parse
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install C++ compiler
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Build examples
        run: |
          g++ -std=c++17 -O2 -I . examples/cpp/algorithm/astar.cpp -o astar
          g++ -std=c++17 -O2 -I . examples/cpp/algorithm/workflow.cpp -o workflow
          g++ -std=c++17 -O2 -I . examples/cpp/algorithm/dijkstra.cpp -o dijkstra
          g++ -std=c++17 -O2 -I . examples/cpp/algorithm/prim.cpp -o prim
          g++ -std=c++17 -O2 -I . examples/cpp/algorithm/kruskal.cpp -o kruskal
          g++ -std=c++17 -O2 -I . examples/cpp/algorithm/tsp_nearest_neighbor.cpp -o tsp_nearest_neighbor
          g++ -std=c++17 -O2 -I . examples/cpp/algorithm/hamiltonian_path_backtracking.cpp -o hamiltonian_path_backtracking

      - name: Export example samples
        run: |
          ./astar --layers=6 --width=4 --seed=17 --output=data/astar-sample-events.graphdyvis.json
          ./workflow --domains=4 --services=6 --seed=23 --output=data/aggregation-sample-events.graphdyvis.json
          ./dijkstra --regions=4 --hubs=5 --seed=29 --output=data/dijkstra-sample-events.graphdyvis.json
          ./prim --clusters=4 --width=5 --seed=31 --output=data/prim-sample-events.graphdyvis.json
          ./kruskal --clusters=4 --width=5 --seed=37 --output=data/kruskal-sample-events.graphdyvis.json
          ./tsp_nearest_neighbor --cities=12 --seed=41 --output=data/tsp-nearest-neighbor-sample-events.graphdyvis.json
          ./hamiltonian_path_backtracking --layers=4 --width=3 --seed=43 --output=data/hamiltonian-path-backtracking-sample-events.graphdyvis.json

      - name: Validate exported samples
        run: npm run check:samples