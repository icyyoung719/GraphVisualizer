name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  node-checks:
    name: Node checks and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: TypeScript and sample validation
        run: npm run check

      - name: Parser tests
        run: npm run test

  cpp-export-and-parse:
    name: C++ example export and parse
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install C++ compiler
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Build examples
        run: |
          g++ -std=c++17 -O2 -I . examples/cpp/astar_demo.cpp -o astar_demo
          g++ -std=c++17 -O2 -I . examples/cpp/workflow_demo.cpp -o workflow_demo

      - name: Export example samples
        run: |
          ./astar_demo --layers=6 --width=4 --seed=17 --output=data/astar-sample-events.json
          ./workflow_demo --domains=4 --services=6 --seed=23 --output=data/aggregation-sample-events.json

      - name: Validate exported samples
        run: npm run check:samples